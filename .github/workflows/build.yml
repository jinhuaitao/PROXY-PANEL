name: Build and Release Binary

on:
  push:
    branches:
      - main
    paths:
      - 'main.go'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ========================================
  # 阶段一：编译二进制文件 (纯 Go 交叉编译，无需 CGO)
  # ========================================
  build-binary:
    name: Build for ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            filename: proxypanel-linux-amd64
          - os: linux
            arch: arm64
            filename: proxypanel-linux-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod download

      - name: Build Binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0 
        run: |
          go build -ldflags "-s -w" -o ${{ matrix.filename }} main.go

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.filename }}
          retention-days: 1

  # ========================================
  # 阶段二：发布 GitHub Release
  # ========================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-binary # 必须等待编译阶段完成
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      # 1. 自动生成版本号
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      # 2. 创建 GitHub Release 并上传编译好的文件
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          files: ./artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. 发送成功通知 (已移除 Docker 提示)
      - name: Send Telegram Notification on Success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: "5091290643"
          token: "8366224917:AAE9UCIzzcCG7Z0CZ8zw8KE5qEHayKI3KUE"
          message: |
            🎉 Go Proxy Panel 编译与发布成功！
            
            📦 项目: ${{ github.repository }}
            🏷️ 版本: ${{ steps.tag_version.outputs.new_tag }}
            
            🔗 下载链接: https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag_version.outputs.new_tag }}
            
            🔍 查看构建日志: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # 4. 发送失败通知
      - name: Send Telegram Notification on Failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: "5091290643"
          token: "8366224917:AAE9UCIzzcCG7Z0CZ8zw8KE5qEHayKI3KUE"
          message: |
            ❌ Go Proxy Panel 编译或发布失败！
            请检查 GitHub Actions 日志以定位错误：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
